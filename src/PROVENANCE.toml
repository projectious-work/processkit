# PROVENANCE.toml — file-to-version provenance map
#
# Maps every file shipped under src/ (relative path) to the processkit
# version (git tag) in which it last meaningfully changed. This file is
# the source of truth for "what changed between two versions" — the diff
# script (scripts/processkit-diff.sh) consumes it.
#
# Auto-generated by scripts/stamp-provenance.sh at release time. Do not
# edit by hand. The release process is:
#
#   1. Make all your changes.
#   2. Run scripts/stamp-provenance.sh <next-version> to update this file.
#   3. Commit, tag, push.
#
# The stamp script walks every file under src/ (excluding PROVENANCE.toml
# itself), compares each file's content against the previous tag's version,
# and updates the entry if the content changed. Unchanged files keep their
# existing version.
#
# Forks: regenerate this file in your fork against your own tags. Set
# `[source].project` to your fork's name. The aibox migration logic uses
# the `source.project` field to identify which upstream a Migration belongs
# to.

[source]
project = "processkit"
upstream = "https://github.com/projectious-work/processkit.git"
generated_at = "2026-04-07T00:00:00Z"
generated_for_tag = "v0.4.0"

# v0.4.0 is the first release with PROVENANCE.toml. The mapping below is the
# initial seed: every file gets the version it first appeared in (best-effort
# reconstruction from git history). Subsequent releases are properly stamped
# from a previous PROVENANCE.toml.
#
# To regenerate this seed, run:
#
#   scripts/stamp-provenance.sh --seed v0.4.0
#
# Files added between releases get the to-tag. Files removed between releases
# disappear from the map.

[files]

# v0.1.0 — foundation
"primitives/FORMAT.md"                                    = "v0.4.0"  # updated in v0.4.0 with privacy + Migration kind
"primitives/INDEX.md"                                     = "v0.4.0"  # updated for 19 primitives
"primitives/schemas/INDEX.md"                             = "v0.1.0"
"primitives/schemas/workitem.yaml"                        = "v0.1.0"
"primitives/schemas/logentry.yaml"                        = "v0.1.0"
"primitives/schemas/decisionrecord.yaml"                  = "v0.1.0"
"primitives/state-machines/INDEX.md"                      = "v0.1.0"
"primitives/state-machines/workitem.yaml"                 = "v0.1.0"
"primitives/state-machines/decisionrecord.yaml"           = "v0.1.0"

# v0.4.0 — Migration primitive (NEW)
"primitives/schemas/migration.yaml"                       = "v0.4.0"
"primitives/state-machines/migration.yaml"                = "v0.4.0"

# Note: per-skill files are not enumerated here in the seed because there
# are 100+ of them. The stamp script will populate them on the first proper
# run. The seed only covers the primitives + format spec, which is the
# minimum needed for the diff script to work for the v0.4.0 → v0.5.0 hop.
#
# After v0.5.0 ships, every file under src/ will have an entry here.
