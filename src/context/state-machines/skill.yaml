apiVersion: processkit.projectious.work/v2
kind: StateMachine
metadata:
  id: SM-skill
  name: skill
  version: "1.0.0-alpha.1"
spec:
  initial: draft
  terminal: [retired]
  states:
    draft:
      transitions:
        - to: active
        - to: retired
    active:
      transitions:
        - to: deprecated
        - to: retired
    deprecated:
      transitions:
        - to: active
        - to: retired
    retired:
      transitions: []
