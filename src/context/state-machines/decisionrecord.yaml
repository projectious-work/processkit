---
apiVersion: processkit.projectious.work/v1
kind: StateMachine
metadata:
  id: SM-decisionrecord
  name: decisionrecord
  version: "1.0.0"
  created: 2026-04-06T00:00:00Z
spec:
  description: >
    Default state machine for DecisionRecord entities. Follows the classic
    ADR lifecycle: proposed → accepted → superseded. Rejected is a terminal
    side channel for decisions that were considered but not adopted.
  initial: proposed
  terminal: [superseded, rejected]
  states:
    proposed:
      description: "A decision has been drafted but not yet agreed to."
      transitions:
        - to: accepted
          guard: "Deciders have agreed; the decision is in force."
        - to: rejected
          guard: "Deciders have declined; the alternative chosen is recorded elsewhere."
    accepted:
      description: "The decision is currently in force."
      transitions:
        - to: superseded
          guard: "A later decision replaces this one. Set superseded_by."
    superseded:
      description: "No longer in force. A later decision replaces it. Terminal."
      transitions: []
    rejected:
      description: "The proposal was not adopted. Terminal. Preserved for history."
      transitions: []
