      seniority: junior
      rank: 1
      effort_floor: low
      effort_ceiling: medium
      rationale: "Junior IC coding \u2014 fast, cheap, sufficient for routine tickets"
  - type: model-assignment
    subject: ROLE-software-engineer
    target: ART-20260503_1832-ModelProfile-code-balanced
