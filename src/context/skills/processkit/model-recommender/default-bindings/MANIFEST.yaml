---
apiVersion: processkit.projectious.work/v1
kind: DefaultBindingPack
metadata:
  id: PACK-default-model-assignments
  version: "1.0.0"
  created: 2026-04-22T00:00:00Z
spec:
  description: >-
    Shipped defaults mapping (role, seniority) → Model at rank 1. Each
    entry is a seed to be instantiated via create_binding during
    installer/import; seeds are not themselves Binding entities yet.

    Projects override by creating their own bindings (same (subject,
    seniority) key at a lower rank; or a SCOPE-level binding that vetoes
    or biases the roster). See DEC-20260422_0234-LoyalComet for the
    8-layer precedence.
  # Model-id tier summary (derived from context/models/*.md):
  #   xxl : claude-opus, claude-sonnet, gpt-5, gpt-5-pro, o3,
  #         gemini-2-5-pro, gemini-3-1-pro, grok-3-5, grok-3, grok-4,
  #         grok-4-1, grok-4-heavy, deepseek-r, qwen3-235b,
  #         mistral-deep-think (close)
  #   xl  : gpt-4o, o4-mini, codestral, deepseek-v, qwen2-5-coder-32b,
  #         qwen2-5-72b
  #   l   : gemini-3-flash, mistral-large, minimax-m, phi
  #   m   : claude-haiku, gemini-flash, gemini-2-5-flash, gemma-3-27b,
  #         mistral-medium, llama-3-70b, cohere-command-r-plus,
  #         minimax-text
  #   s   : mistral-small
  #
  # Junior    → m/l ladder (fast, cheap; enough capability for routine work).
  # Senior    → xl    ladder (mid-frontier; strong on complex IC work).
  # Principal → xxl   ladder (frontier flagship; reserved for architecture-
  #             scale work that justifies the cost).
  bindings:
    # ── software-engineer ────────────────────────────────────────────────
    - type: model-assignment
      subject: ROLE-software-engineer
      target: MODEL-anthropic-claude-haiku
      conditions:
        seniority: junior
        rank: 1
        effort_floor: low
        effort_ceiling: medium
        rationale: "Junior IC coding — fast, cheap, sufficient for routine tickets"
    - type: model-assignment
      subject: ROLE-software-engineer
      target: MODEL-anthropic-claude-sonnet
      conditions:
        seniority: senior
        rank: 1
        effort_floor: medium
        effort_ceiling: high
        rationale: "Senior IC coding — best price-capability ratio for day-to-day work"
    - type: model-assignment
      subject: ROLE-software-engineer
      target: MODEL-anthropic-claude-opus
      conditions:
        seniority: principal
        rank: 1
        effort_floor: high
        effort_ceiling: extra-high
        rationale: "Principal IC coding — reserve for architecture-scale changes"

    # ── solutions-architect ──────────────────────────────────────────────
