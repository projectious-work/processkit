      seniority: senior
      rank: 1
      effort_floor: medium
      effort_ceiling: high
      rationale: "Senior IC coding \u2014 best price-capability ratio for day-to-day\
        \ work"
  - type: model-assignment
    subject: ROLE-software-engineer
    target: ART-20260503_1832-ModelProfile-code-deep
    conditions:
      seniority: principal
      rank: 1
      effort_floor: high
      effort_ceiling: extra-high
      rationale: "Principal IC coding \u2014 reserve for architecture-scale changes"
  - type: model-assignment
    subject: ROLE-software-engineer
    target: ART-20260503_1832-ModelProfile-code-fast
    conditions:
      seniority: specialist
      rank: 1
      effort_floor: low
      effort_ceiling: medium
      rationale: "Seed: Specialist software-engineer \u2014 inherits junior defaults\
        \ pending role-specific tuning (KeenFern v0.21.0)"
