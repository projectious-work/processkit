  description: Shipped defaults mapping (role, seniority) to Artifact(kind=model-profile)
    at rank 1. Each profile expands to provider-specific Artifact(kind=model-spec)
    candidates after runtime access gates are applied. Projects override by creating
    their own bindings or provider/access policy. See DEC-20260503_1829-LoyalComet.
