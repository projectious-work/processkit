---
extends:
  - ../fragments/entity.yaml
  - ../fragments/versioned.yaml
apiVersion: processkit.projectious.work/v2
kind: Schema
metadata:
  id: SCHEMA-gate
  target_kind: Gate
  version: 1.0.0
  created: 2026-04-07T00:00:00Z
spec:
  description: >
    A validation checkpoint a process must pass. Gate evaluation results are
    LogEntries; the Gate definition itself is the durable rule.
  id_prefix: GATE
  state_machine: null
  default_directory: context/gates
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required:
      - name
      - description
      - kind
      - validator
    additionalProperties: true
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        description: Short kebab-case identifier.
      description:
        type: string
        minLength: 1
        description: What this gate checks.
      kind:
        type: string
        enum:
          - manual
          - automated
          - hybrid
        description: How the gate is evaluated.
      validator:
        type: string
        description: Prose description of the check.
      validator_command:
        type: [string, "null"]
        description: Optional CLI command for automated or hybrid gates.
      required_roles:
        type: array
        items:
          type: string
          pattern: ^ROLE-[a-zA-Z0-9_-]+$
        description: Roles authorized to sign off on this gate.
      blocking:
        type: boolean
        default: true
        description: Whether failure blocks further progress.
      evidence_required:
        type: boolean
        default: false
        description: Whether a passing event must reference evidence.
