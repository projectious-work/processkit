extends:
  - ../fragments/entity.yaml
  - ../fragments/versioned.yaml
apiVersion: processkit.projectious.work/v2
kind: Schema
metadata:
  id: SCHEMA-role
  target_kind: Role
  version: "1.0.0-alpha.1"
  created: 2026-07-23T00:00:00Z
spec:
  description: A reusable responsibility and authority profile.
  id_prefix: ROLE
  state_machine: null
  default_directory: context/roles
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [name, description]
    additionalProperties: true
    properties:
      name: {type: string, minLength: 1}
      description: {type: string, minLength: 1}
      responsibilities:
        type: array
        items: {type: string}
      skills_required:
        type: array
        items: {type: string}
      default_scope: {type: [string, "null"]}
      function_group: {type: [string, "null"]}
      supersedes: {type: [string, "null"], pattern: "^ROLE-"}
