extends:
  - ../fragments/entity.yaml
  - ../fragments/record.yaml
  - ../fragments/versioned.yaml
apiVersion: processkit.projectious.work/v2
kind: Schema
metadata:
  id: SCHEMA-event
  target_kind: Event
  version: "1.0.0-alpha.1"
  created: 2026-07-23T00:00:00Z
spec:
  interfaces:
    __merge: concat
    value: [Event]
  description: An immutable record that something occurred.
  id_prefix: EVT
  state_machine: null
  default_directory: context/events
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [event_type, occurred_at]
    additionalProperties: true
    properties:
      event_type: {type: string, minLength: 1}
      occurred_at: {type: string, format: date-time}
      actor: {type: [string, "null"]}
      subject: {type: [string, "null"]}
      data: {type: object}
