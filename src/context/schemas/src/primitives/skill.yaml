extends:
  - ../fragments/entity.yaml
  - ../fragments/versioned.yaml
apiVersion: processkit.projectious.work/v2
kind: Schema
metadata:
  id: SCHEMA-skill
  target_kind: Skill
  version: "1.0.0-alpha.1"
  created: 2026-07-23T00:00:00Z
spec:
  interfaces:
    __merge: concat
    value: [Skill]
  description: A versioned package of instructions, tools, and capabilities.
  id_prefix: SKILL
  state_machine: skill
  default_directory: context/skills
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [name, description, version, state]
    additionalProperties: true
    properties:
      name: {type: string, minLength: 1}
      description: {type: string, minLength: 1}
      version: {type: string, minLength: 1}
      state:
        type: string
        enum: [draft, active, deprecated, retired]
      category: {type: [string, "null"]}
      layer: {type: [integer, "null"]}
      uses: {type: array, items: {type: object}}
      provides: {type: object}
      commands: {type: array, items: {type: object}}
      triggers: {type: array, items: {type: string}}
      owners: {type: array, items: {type: string}}
      capabilities: {type: array, items: {type: string}}
