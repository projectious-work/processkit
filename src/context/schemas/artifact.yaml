---
apiVersion: processkit.projectious.work/v2
kind: Schema
metadata:
  id: SCHEMA-artifact
  target_kind: Artifact
  version: "2.0.0-alpha.1"
  created: 2026-04-07T00:00:00Z
spec:
  description: >
    A tangible deliverable produced by the project — a document, design
    file, dataset, build output, slide deck, video, or URL.

    Two usage patterns are equally valid:
    Self-hosted: the artifact content is the Markdown body of this file.
    location may reference the file's own path or be omitted. Use for
    documents that belong in the repository (PRDs, runbooks, research
    reports, work instructions).
    Pointer: the deliverable lives elsewhere (external URL, cloud storage,
    build artifact). location is the canonical address. processkit stores
    only the metadata card.

    Note vs Artifact: an Artifact is a completed deliverable with no
    promotion lifecycle. A Note is a thought in transit that may promote
    to an Artifact. Use Artifact when the thing is done; use Note while
    it is still being developed or reviewed.
  id_prefix: ART
  state_machine: null
  default_directory: context/artifacts
  known_kinds:
    - document
    - design
    - dataset
    - build
    - slides
    - video
    - spec
    - diagram
    - url
    - other
    - diagnostic
    - reference-dataset
    - test-fixture
    - tool-allowlist-policy
    - egress-policy
    - credential-scope
    - memory-policy
    - approval-policy
    - trace-policy
    - cost-policy
    - agent-card
    - provider-adapter-config
    - agent-ids-rule
    - workspace-manifest
    - addon-spec
    - container-image-spec
    - provider-backend-spec
    - image-provenance-policy
    - schedule-rule
    - process-definition
    - model-spec
    - model-profile
    - metric-spec
    - memory-index
    - eval-spec
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [name, kind]
    additionalProperties: true
    properties:
      name:
        type: string
        minLength: 1
        description: "Human-readable name."
      kind:
        type: string
        description: >
          Closed v2 artifact subtype declared in spec.known_kinds.
      unit:
        type: string
        description: >
          Optional. Unit of measurement for metric-spec artifacts.
      direction:
        type: string
        enum:
          - higher-is-better
          - lower-is-better
          - target
        description: >
          Optional for metric-spec artifacts. Which direction is good.
      measurement:
        type: string
        description: >
          Optional for metric-spec artifacts. Prose recipe or query for
          computing the metric value.
      target:
        description: >
          Optional for metric-spec artifacts. Desired value or target
          expression.
      tolerance:
        type: string
        description: >
          Optional for metric-spec artifacts. Acceptable deviation from
          target.
      cadence:
        type: string
        description: >
          Optional for metric-spec artifacts. Measurement frequency.
      active:
        type: boolean
        default: true
        description: >
          Optional for metric-spec artifacts. False means no longer tracked.
      location:
        type: string
        description: >
          Where the artifact lives — a path, URL, repository reference,
          or storage identifier. Treated as opaque by processkit.
          Optional for self-hosted artifacts (content in Markdown body);
          required for pointer artifacts pointing to external resources.
      format:
        type: string
        description: >
          Optional. File format or MIME type (e.g. pdf, png, application/json)."
      version:
        type: string
        description: "Optional. Version identifier for the artifact."
      checksum:
        type: string
        description: "Optional. Hash for integrity verification."
      owner:
        type: [string, "null"]
        pattern: "^(ACTOR|TEAMMEMBER)-[a-zA-Z0-9_-]+$"
        description: "Actor or TeamMember responsible for the artifact."
      produced_by:
        type: string
        description: >
          Optional. Reference to the entity (workitem, process,
          decision) that produced this artifact.
      produced_at:
        type: string
        format: date-time
        description: "When the artifact was produced."
      tags:
        type: array
        items:
          type: string
        description: "Freeform tags for retrieval."
