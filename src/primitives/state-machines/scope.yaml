---
apiVersion: processkit.projectious.work/v1
kind: StateMachine
metadata:
  id: SM-scope
  name: scope
  version: "1.0.0"
  created: 2026-04-07T00:00:00Z
spec:
  description: >
    Default state machine for Scope entities. Scopes start as planned,
    become active when work begins, and complete (or are cancelled).
    Reactivation from completed/cancelled is intentionally not allowed
    — create a new scope instead so historical references stay stable.
  initial: planned
  terminal: [completed, cancelled]
  states:
    planned:
      description: "Scope defined but not yet started."
      transitions:
        - to: active
        - to: cancelled
    active:
      description: "Scope is in progress; entities may reference it."
      transitions:
        - to: completed
        - to: cancelled
    completed:
      description: "Scope reached its end. Historical reference only."
      transitions: []
    cancelled:
      description: "Scope abandoned before completion."
      transitions: []
