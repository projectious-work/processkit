# Docker Compose override — project-specific services and overrides.
# This file is never overwritten by `aibox sync`. You own it.
#
# Docker Compose automatically merges this with the generated
# docker-compose.yml (strategic merge by service name).
# When present, `aibox sync` wires it into devcontainer.json.
#
# Example — add a PostgreSQL sidecar:
#
#   services:
#     postgres:
#       image: postgres:16
#       environment:
#         POSTGRES_PASSWORD: dev
#       ports:
#         - "5432:5432"
#
# Example — add depends_on to the main service:
#
#   services:
#     my-project:            # must match [container] name in aibox.toml
#       depends_on:
#         - postgres
