apiVersion: processkit.projectious.work/v2
kind: StateMachine
metadata:
  id: SM-discussion
  name: discussion
  version: 1.0.0
  created: 2026-04-07 00:00:00+00:00
spec:
  description: |
    Default state machine for Discussion entities. Discussions are active while exploring, resolved when convergence is reached (with or without producing DecisionRecords), and archived when no longer actively referenced. Reopening a resolved discussion is allowed — sometimes a question comes back.
  initial: active
  terminal:
  - archived
  states:
    active:
      description: Currently being explored.
      transitions:
      - to: resolved
      - to: archived
    resolved:
      description: Convergence reached. May have produced DecisionRecords.
      transitions:
      - to: active
      - to: archived
    archived:
      description: No longer actively referenced. Kept for historical context.
      transitions: []
