---
apiVersion: processkit.projectious.work/v1
kind: Schema
metadata:
  id: SCHEMA-context
  target_kind: Context
  version: "1.0.0"
  created: 2026-04-07T00:00:00Z
spec:
  description: >
    A structured narrative document that holds long-lived project or
    owner context — identity, working style, goals, team relationships,
    grooming reports, situational briefings. The frontmatter is
    intentionally minimal; the value lives in the Markdown body.
    Context entities often use custom IDs (e.g. OWNER-identity,
    OWNER-working-style) instead of the CTX prefix when the entity is
    one-of-a-kind within a well-known directory.
  id_prefix: CTX
  state_machine: null
  default_directory: context
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [description]
    additionalProperties: true
    properties:
      description:
        type: string
        minLength: 1
        description: "One-sentence summary of what this context document holds."
      purpose:
        type: string
        description: "Optional. Why this document exists — when an agent should read it."
      scope:
        type: string
        description: >
          Optional. Where this context applies (project, owner,
          team, sprint).
      tags:
        type: array
        items:
          type: string
        description: "Optional freeform tags for retrieval."
      sensitive:
        type: boolean
        default: false
        description: >
          Optional. True = the body contains sensitive information that
          should be handled with care. Pair with metadata.privacy:
          user-private and the context/**/private/ filesystem rule.
