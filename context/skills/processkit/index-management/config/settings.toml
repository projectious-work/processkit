# index-management configuration
# Edited by the agent during first-time setup (see AGENTS.md).
# Changes take effect immediately — no MCP server restart required.

# Directory name overrides under context/ — uncomment to change defaults.
# [directories]
# WorkItem       = "workitems"
# LogEntry       = "logs"
# DecisionRecord = "decisions"
# Discussion     = "discussions"
# Actor          = "actors"
# Role           = "roles"
# Scope          = "scopes"
# Gate           = "gates"
# Binding        = "bindings"
# Migration      = "migrations"

# Log sharding — date-based subdirectories for high-volume log entries.
[sharding.LogEntry]
scheme  = "date"
pattern = "context/logs/{year}/{month}/"

[sharding.logentry]
pattern = "date-shard"
template = "{year}/{month}/"

[sharding.note]
pattern = "date-shard"
template = "{year}/{month}/"

[sharding.workitem]
pattern = "date-shard"
template = "{year}/{month}/"
activate_above_count = 500
archive_pattern = "archive-shard"
archive_template = "done/{year}/{month}/"
archive_states = ["done", "cancelled"]

[sharding.scope]
pattern = "flat"
archive_pattern = "archive-shard"
archive_template = "done/{year}/{month}/"
archive_states = ["completed", "cancelled"]

[sharding.migration]
pattern = "lifecycle-shard"
template = "{state}/"
