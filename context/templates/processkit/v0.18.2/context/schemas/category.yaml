---
apiVersion: processkit.projectious.work/v1
kind: Schema
metadata:
  id: SCHEMA-category
  target_kind: Category
  version: "1.0.0"
  created: 2026-04-07T00:00:00Z
spec:
  description: >
    A named classification — a defined set of values for a labeling axis
    that other entities can be tagged with. Categories are for closed
    sets (priority levels, bug severity, feature tier, product area).
    For open-ended freeform tags, use labels instead. For who-does-things,
    use Roles.
  id_prefix: CAT
  state_machine: null
  default_directory: context/categories
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [name, description, axis, values]
    additionalProperties: true
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        description: "Category name (kebab-case)."
      description:
        type: string
        description: "What this axis classifies."
      axis:
        type: string
        description: "The label key used on entities, e.g. 'priority'."
      values:
        type: array
        minItems: 1
        items:
          type: object
          required: [name]
          additionalProperties: true
          properties:
            name:
              type: string
            description:
              type: string
            deprecated:
              type: boolean
              default: false
            children:
              type: array
              items:
                type: object
              description: "Optional nested values for hierarchical categories."
        description: "Allowed values for this category axis."
      applies_to:
        type: array
        items:
          type: string
        description: >
          Primitive kinds this category applies to (e.g. WorkItem,
          DecisionRecord). Empty list means it applies anywhere.
      default:
        type: string
        description: "Optional default value if unspecified."
      multi:
        type: boolean
        default: false
        description: "If true, an entity can carry multiple values."
