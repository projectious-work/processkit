---
apiVersion: processkit.projectious.work/v1
kind: Schema
metadata:
  id: SCHEMA-actor
  target_kind: Actor
  version: "1.1.0"
  created: 2026-04-07T00:00:00Z
x-allowed-role-ids:
  - assistant
  - developer
  - jr-architect
  - jr-developer
  - jr-researcher
  - pm-claude
  - sr-architect
  - sr-researcher
spec:
  description: >
    A participant in the project: human, AI agent, or service. Actors do
    things — get assigned WorkItems, decide DecisionRecords, perform
    automated actions. They are descriptive, not restrictive: there is
    no RBAC enforcement attached to an Actor's roles or expertise.
  id_prefix: ACTOR
  state_machine: null
  default_directory: context/actors
  metadata_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    properties:
      id:
        type: string
        pattern: >-
          ^ACTOR-(\d{8}_\d{4}-[A-Z][a-z]+[A-Z][a-z]+-[a-z0-9-]+|[a-z][a-z0-9-]*)$
        description: >
          Two accepted shapes: identity class
          (ACTOR-<YYYYMMDD_HHMM>-<WordPair>-<slug>) or role class
          (ACTOR-<kebab-slug> where slug is in x-allowed-role-ids).
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [type, name]
    additionalProperties: true
    properties:
      type:
        type: string
        enum: [human, ai-agent, service]
        description: "Kind of actor."
      name:
        type: string
        minLength: 1
        maxLength: 200
        description: "Display name. For agents, model name + version."
      email:
        type: string
        format: email
        description: "Optional. Human actors only."
      handle:
        type: string
        description: "Optional. GitHub handle, Slack user, etc."
      expertise:
        type: array
        items:
          type: string
        description: "Tags used by assignment-suggestion logic."
      roles:
        type: array
        items:
          type: string
          pattern: "^ROLE-[a-zA-Z0-9_-]+$"
        description: >
          Role IDs. Shortcut for unscoped role assignment. For scoped or
          time-bounded role assignments, prefer a Binding.
      preferences:
        type: object
        additionalProperties: true
        description: >
          Free-form per-actor preferences. Conventional keys include
          commit_style, timezone, review_style, communication, languages.
      active:
        type: boolean
        default: true
        description: >
          False = profile preserved (history references it) but no new
          work assigned. Set when the actor leaves the project.
      joined_at:
        type: string
        format: date-time
        description: "When the actor became part of the project."
      left_at:
        type: string
        format: date-time
        description: "When the actor stopped (typically also sets active: false)."
      model_profile_override:
        type: object
        description: >
          Rare per-actor override of the Role's default model_profiles
          ranked list. Use only for exceptional cases (e.g. an actor
          licensed for a specific model variant not in the role set).
          The PM applies this in place of the role's model_profiles when
          routing tasks to this actor. Added 2026-04-17.
        additionalProperties: false
        properties:
          rank:
            type: integer
            minimum: 1
            description: "1 = primary, 2 = first alternate, etc."
          provider:
            type: string
            description: "Vendor: anthropic, openai, google, xai, deepseek, ..."
          family:
            type: string
            description: "Model family, e.g. claude-opus, gpt-5, gemini-pro."
          default_version:
            type: string
            description: "Version string, e.g. \"4.7\", \"5.4\"."
          default_effort:
            type: string
            enum: [minimal, low, medium, high, xhigh, none]
            description: "Effort tier. Use \"none\" for models without tiers (e.g. Haiku)."
          rationale:
            type: string
            description: "One-line reason this option is in the set at this rank."
