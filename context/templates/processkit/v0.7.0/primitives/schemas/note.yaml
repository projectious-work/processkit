---
apiVersion: processkit.projectious.work/v1
kind: Schema
metadata:
  id: SCHEMA-note
  target_kind: Note
  version: "1.0.0"
  created: 2026-04-08T00:00:00Z
spec:
  description: >
    A captured thought, insight, or reference — the lightweight capture
    unit in processkit. Notes are intentionally low-structure on entry:
    the user records quickly, reviews periodically, and promotes to more
    structured primitives (WorkItems, DecisionRecords, etc.) when a note
    has ripened into something actionable. Inspired by the Zettelkasten
    model: capture fast, refine deliberately, link explicitly.
  id_prefix: NOTE
  state_machine: note
  default_directory: context/notes
  spec_schema:
    $schema: https://json-schema.org/draft/2020-12/schema
    type: object
    required: [title, body, type, state]
    additionalProperties: true
    properties:
      title:
        type: string
        minLength: 1
        maxLength: 120
        description: "One-line summary. Should be a self-contained claim or question, not a topic label."
      body:
        type: string
        description: "The note content. Fleeting notes may be a single sentence; permanent notes should be self-contained."
      type:
        type: string
        enum: [fleeting, insight, reference, question]
        description: >
          Note type.
          fleeting: quick capture, not yet refined — review within a week.
          insight: a conclusion or realization from experience or reflection.
          reference: a pointer to an external source with your own summary.
          question: an open question — may promote to a WorkItem (spike) or DecisionRecord.
      state:
        type: string
        description: "Current state per the note state machine."
      tags:
        type: array
        items:
          type: string
        description: "Free-form tags for discoverability. Prefer existing tags over new ones."
      source:
        type: string
        description: "For reference notes: URL, book title, or conversation description."
      promotes_to:
        type: object
        description: "When a note is promoted, record the target primitive kind and ID."
        properties:
          kind:
            type: string
            enum: [WorkItem, DecisionRecord, Artifact, Discussion]
          id:
            type: string
        required: [kind, id]
      review_due:
        type: string
        format: date
        description: "Date by which this note should be reviewed. Set automatically on capture."
