# aibox starship config — arrow preset (powerline chevron/airline style)
# Requires a Nerd Font or Powerline-patched font for the arrow separators (e0b0/e0b2).
palette = "aibox"

format = """
[](fg:#BD93F9)\
$directory\
[](fg:#BD93F9 bg:#50FA7B)\
$git_branch\
$git_status\
[](fg:#50FA7B bg:#282A36)\
 $cmd_duration\
$line_break\
$character"""

[directory]
style = "bold bg:#BD93F9 fg:#282A36"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[git_branch]
style = "bg:#50FA7B fg:#282A36"
symbol = " "
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#50FA7B fg:#282A36"
format = "[$all_status$ahead_behind]($style)"
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕⇡$ahead_count⇣$behind_count"
modified = "!$count"
staged = "+$count"
untracked = "?$count"

[cmd_duration]
style = "fg:#6272A4"
min_time = 2_000
format = "[ $duration]($style)"

[character]
success_symbol = "[❯](bold fg:#BD93F9)"
error_symbol = "[❯](bold fg:#FF5555)"

[python]
style = "fg:#F1FA8C"
format = "[$symbol$version]($style) "
[rust]
style = "fg:#FFB86C"
format = "[$symbol$version]($style) "
[nodejs]
style = "fg:#50FA7B"
format = "[$symbol$version]($style) "
[golang]
style = "fg:#8BE9FD"
format = "[$symbol$version]($style) "

[palettes.aibox]
bg = "#282A36"
fg = "#F8F8F2"
accent = "#BD93F9"
