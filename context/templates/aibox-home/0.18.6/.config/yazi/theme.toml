# =============================================================================
# Yazi theme — dracula
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#BD93F9" }
hovered = { fg = "#282A36", bg = "#F8F8F2" }
preview_hovered = { underline = true }
find_keyword = { fg = "#F1FA8C", bold = true }
find_position = { fg = "#FF79C6", italic = true }
marker_selected = { fg = "#50FA7B", bg = "#50FA7B" }
marker_copied = { fg = "#BD93F9", bg = "#BD93F9" }
marker_cut = { fg = "#FF5555", bg = "#FF5555" }

[tabs]
active = { fg = "#282A36", bg = "#F8F8F2", bold = true }
inactive = { fg = "#6272A4", bg = "#44475A" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#282A36", bg = "#50FA7B", bold = true }
normal_alt = { fg = "#50FA7B", bg = "#44475A", bold = true }
select_main = { fg = "#282A36", bg = "#BD93F9", bold = true }
select_alt = { fg = "#BD93F9", bg = "#44475A", bold = true }
unset_main = { fg = "#282A36", bg = "#FF79C6", bold = true }
unset_alt = { fg = "#FF79C6", bg = "#44475A", bold = true }

[status]
overall = { fg = "#F8F8F2", bg = "#44475A" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#BD93F9" }
perm_read = { fg = "#F1FA8C" }
perm_write = { fg = "#FF5555" }
perm_exec = { fg = "#50FA7B" }
perm_sep = { fg = "#6272A4" }
progress_label = { fg = "#F8F8F2", bold = true }
progress_normal = { fg = "#BD93F9", bg = "#44475A" }
progress_error = { fg = "#FF5555", bg = "#44475A" }

[input]
border = { fg = "#BD93F9" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#BD93F9" }
active = { fg = "#FF79C6" }
inactive = {}

[cmp]
border = { fg = "#BD93F9" }
active = { fg = "#FF79C6" }
inactive = {}

[tasks]
border = { fg = "#BD93F9" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#44475A" }
cand = { fg = "#8BE9FD" }
rest = { fg = "#6272A4" }
desc = { fg = "#FF79C6" }
separator = "  "
separator_style = { fg = "#44475A" }

[help]
on = { fg = "#8BE9FD" }
run = { fg = "#FF79C6" }
desc = {}
hovered = { bg = "#44475A", bold = true }
footer = { fg = "#44475A", bg = "#F8F8F2" }

[git]
modified = { fg = "#F1FA8C" }
untracked = { fg = "#FF79C6" }
added = { fg = "#50FA7B" }
deleted = { fg = "#FF5555" }
updated = { fg = "#8BE9FD" }
ignored = { fg = "#6272A4" }

[filetype]
rules = [
    { name = "*/", fg = "#BD93F9", bold = true },
    { name = "*.rs", fg = "#FFB86C" },
    { name = "*.py", fg = "#F1FA8C" },
    { name = "*.js", fg = "#F1FA8C" },
    { name = "*.ts", fg = "#BD93F9" },
    { name = "*.sh", fg = "#50FA7B" },
    { name = "*.toml", fg = "#8BE9FD" },
    { name = "*.yaml", fg = "#8BE9FD" },
    { name = "*.yml", fg = "#8BE9FD" },
    { name = "*.json", fg = "#8BE9FD" },
    { name = "*.kdl", fg = "#8BE9FD" },
    { name = "*.html", fg = "#FFB86C" },
    { name = "*.css", fg = "#BD93F9" },
    { name = "*.md", fg = "#F8F8F2" },
    { name = "*.tex", fg = "#50FA7B" },
    { name = "*.typ", fg = "#50FA7B" },
    { name = "*.pdf", fg = "#FF5555" },
    { name = "*.png", fg = "#FF79C6" },
    { name = "*.jpg", fg = "#FF79C6" },
    { name = "*.jpeg", fg = "#FF79C6" },
    { name = "*.gif", fg = "#FF79C6" },
    { name = "*.svg", fg = "#FF79C6" },
    { name = "*.zip", fg = "#FFB86C" },
    { name = "*.tar*", fg = "#FFB86C" },
    { name = "*.gz", fg = "#FFB86C" },
    { name = "*.gitignore", fg = "#6272A4" },
    { name = ".env*", fg = "#FF5555" },
    { name = "Dockerfile*", fg = "#BD93F9" },
    { name = "Makefile", fg = "#50FA7B" },
    { name = "Cargo.toml", fg = "#FFB86C", bold = true },
    { name = "Cargo.lock", fg = "#6272A4" },
]
