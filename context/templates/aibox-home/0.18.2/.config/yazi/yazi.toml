[mgr]
ratio = [3, 5, 18]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 600
max_height = 900
image_delay = 30
image_filter = "nearest"

[plugin]
prepend_fetchers = [
    { id = "git", url = "*",  run = "git" },
    { id = "git", url = "*/", run = "git" },
    { id = "status-git", url = "*", run = "status-git" },
]
prepend_previewers = [
    # Directory preview: columnar listing with git status, size, date, owner, permissions
    { url = "*/", run = "dir-preview" },
    { url = "*.svg",  run = "svg" },
    { url = "*.eps",  run = "eps" },
    { url = "*.jpg",  run = "image" },
    { url = "*.jpeg", run = "image" },
    { url = "*.png",  run = "image" },
    { url = "*.gif",  run = "image" },
    { url = "*.webp", run = "image" },
    { url = "*.bmp",  run = "image" },
    { url = "*.tiff", run = "image" },
    { url = "*.tif",  run = "image" },
    { url = "*.pdf",  run = "pdf" },
]

[opener]
edit = [
    { run = '${EDITOR:-vim} "$@"', desc = "Edit in-place", block = true },
]
edit-pane = [
    { run = 'open-in-editor "$1"', desc = "Open in vim pane", block = false },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { name = "*", use = "edit" },
]
