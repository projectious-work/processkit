[mgr]
ratio = [3, 5, 18]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = true
show_symlink = true

[preview]
max_width = 600
max_height = 900
image_delay = 30
image_filter = "nearest"

[plugin]
prepend_fetchers = [
    { id = "git", url = "*",  run = "git" },
    { id = "git", url = "*/", run = "git" },
]
prepend_previewers = [
    # Directory preview: eza with git status, permissions, size, and date columns
    { name = "*/", run = "piper -- eza -la --git --color=always --icons=always --group-directories-first --no-quotes --no-time \"$1\"" },
    { name = "*.svg",  run = "svg" },
    { name = "*.eps",  run = "eps" },
    { name = "*.jpg",  run = "image" },
    { name = "*.jpeg", run = "image" },
    { name = "*.png",  run = "image" },
    { name = "*.gif",  run = "image" },
    { name = "*.webp", run = "image" },
    { name = "*.bmp",  run = "image" },
    { name = "*.tiff", run = "image" },
    { name = "*.tif",  run = "image" },
    { name = "*.pdf",  run = "pdf" },
]

[opener]
edit = [
    { run = '${EDITOR:-vim} "$@"', desc = "Edit in-place", block = true },
]
edit-pane = [
    { run = 'open-in-editor "$1"', desc = "Open in vim pane", block = false },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { name = "*", use = "edit" },
]
